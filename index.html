<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Insight Dashboard</title>
    <style>
      :root {
        --bg1: #f6f7fb;
        --bg2: #dfe7ff;
        --ink: #102a43;
        --accent: #1f6feb;
        --card: #ffffff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at 20% 20%, var(--bg2), var(--bg1));
        display: grid;
        place-items: center;
      }
      .card {
        width: min(92vw, 760px);
        padding: 28px;
        border-radius: 20px;
        background: var(--card);
        box-shadow: 0 10px 30px rgba(16, 42, 67, 0.12);
      }
      h1 { margin: 0 0 12px; font-size: clamp(1.6rem, 3.2vw, 2.4rem); }
      p { margin: 0 0 18px; line-height: 1.6; }
      .badge {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        background: #e8f1ff;
        color: var(--accent);
        font-weight: 600;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <span class="badge">Deployment Ready</span>
      <h1>Insight Dashboard</h1>
      <p>本地开发环境已就绪。这个页面可以用于 GitHub Pages、Vercel、Netlify 三种部署验证。</p>
      <p>如果你看到这段文字，说明静态页面运行正常。</p>
    </main>
  </body>
</html>
